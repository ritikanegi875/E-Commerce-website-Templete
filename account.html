
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.account-wrapper{
position:relative;
}

.icon-btn{
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
font-size:18px;
}

.account-panel{
width:350px;
background:white;
border-radius:8px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
padding:20px;
margin-top:10px;
}

.account-tabs{
display:flex;
margin-bottom:20px;
}

.account-tab{
flex:1;
text-align:center;
padding:10px;
cursor:pointer;
border-bottom:2px solid transparent;
}

.account-tab.active{
border-bottom:2px solid #000;
font-weight:bold;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
font-size:14px;
display:block;
margin-bottom:5px;
}

.input-wrap{
display:flex;
align-items:center;
border:1px solid #ccc;
padding:8px;
border-radius:4px;
}

.input-wrap input{
border:none;
outline:none;
flex:1;
margin-left:5px;
}

.toggle-pass{
cursor:pointer;
}

.form-row{
display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:15px;
}

.btn-auth{
width:100%;
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
border-radius:4px;
}

.hidden{
display:none;
}

.user-profile{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.user-avatar{
background:black;
color:white;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.user-menu{
list-style:none;
padding:0;
margin:10px 0;
}

.user-menu li{
padding:8px 0;
}

.user-menu a{
text-decoration:none;
color:#333;
}

.btn-logout{
width:100%;
padding:10px;
border:none;
background:#e74c3c;
color:white;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="account-wrapper">

<div class="account-panel">

<!-- AUTH VIEW -->
<div id="authView">

<div class="account-tabs">
<div class="account-tab active" onclick="switchAuthTab('login',this)">Login</div>
<div class="account-tab" onclick="switchAuthTab('register',this)">Register</div>
</div>

<!-- LOGIN -->
<div class="auth-form" id="loginForm">

<div class="form-group">
<label>Email Address</label>
<div class="input-wrap">
<i class="fa fa-envelope"></i>
<input type="email" id="loginEmail" placeholder="you@email.com">
</div>
</div>

<div class="form-group">
<label>Password</label>
<div class="input-wrap">
<i class="fa fa-lock"></i>
<input type="password" id="loginPass" placeholder="••••••••">
<i class="fa fa-eye toggle-pass" onclick="togglePass('loginPass',this)"></i>
</div>
</div>

<div class="form-row">
<label><input type="checkbox"> Remember me</label>
<a href="#">Forgot Password?</a>
</div>

<button class="btn-auth" onclick="doLogin()">
<i class="fa fa-sign-in-alt"></i> Login
</button>

</div>

<!-- REGISTER -->
<div class="auth-form hidden" id="registerForm">

<div class="form-group">
<label>Full Name</label>
<div class="input-wrap">
<i class="fa fa-user"></i>
<input type="text" id="regName" placeholder="John Doe">
</div>
</div>

<div class="form-group">
<label>Email Address</label>
<div class="input-wrap">
<i class="fa fa-envelope"></i>
<input type="email" id="regEmail" placeholder="you@email.com">
</div>
</div>

<div class="form-group">
<label>Password</label>
<div class="input-wrap">
<i class="fa fa-lock"></i>
<input type="password" id="regPass" placeholder="Min 8 characters">
<i class="fa fa-eye toggle-pass" onclick="togglePass('regPass',this)"></i>
</div>
</div>

<button class="btn-auth" onclick="doRegister()">
<i class="fa fa-user-plus"></i> Create Account
</button>

</div>

</div>

<!-- USER DASHBOARD -->
<div id="userView" class="hidden">

<div class="user-profile">
<div class="user-avatar" id="userAvatar">J</div>
<div>
<div id="userName">John Doe</div>
<div id="userEmail">john@email.com</div>
</div>
</div>

<ul class="user-menu">
<li><a href="#"><i class="fa fa-user-circle"></i> My Profile</a></li>
<li><a href="#"><i class="fa fa-shopping-bag"></i> My Orders</a></li>
<li><a href="#"><i class="fa fa-heart"></i> Wishlist</a></li>
<li><a href="#"><i class="fa fa-map-marker-alt"></i> Addresses</a></li>
<li><a href="#"><i class="fa fa-credit-card"></i> Payment Methods</a></li>
<li><a href="#"><i class="fa fa-cog"></i> Settings</a></li>
</ul>

<button class="btn-logout" onclick="doLogout()">
<i class="fa fa-sign-out-alt"></i> Sign Out
</button>

</div>

</div>
</div>

<script>

function switchAuthTab(type,el){

document.querySelectorAll(".account-tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

if(type==="login"){
document.getElementById("loginForm").classList.remove("hidden")
document.getElementById("registerForm").classList.add("hidden")
}else{
document.getElementById("registerForm").classList.remove("hidden")
document.getElementById("loginForm").classList.add("hidden")
}

}

function togglePass(id,icon){

let input=document.getElementById(id)

if(input.type==="password"){
input.type="text"
icon.classList.replace("fa-eye","fa-eye-slash")
}else{
input.type="password"
icon.classList.replace("fa-eye-slash","fa-eye")
}

}

function doLogin(){

let email=document.getElementById("loginEmail").value
let name=email.split("@")[0]

document.getElementById("authView").classList.add("hidden")
document.getElementById("userView").classList.remove("hidden")

document.getElementById("userName").innerText=name
document.getElementById("userEmail").innerText=email
document.getElementById("userAvatar").innerText=name.charAt(0).toUpperCase()

}

function doRegister(){
alert("Account created! Please login.")
}

function doLogout(){

document.getElementById("userView").classList.add("hidden")
document.getElementById("authView").classList.remove("hidden")

}

</script>

</body>
</html>
```
